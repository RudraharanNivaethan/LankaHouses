<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lanka Houses - List View</title>
<style>
    body {
        margin: 0;
        font-family: 'Arial', sans-serif;
        background-color: #fff;
        color: #333;
    }
    header {
        background-color: #c70039;
        color: #fff;
        padding: 20px;
        text-align: center;
        font-size: 2rem;
        letter-spacing: 1px;
    }
    main {
        padding: 30px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 25px;
    }
    .house-card {
        background-color: #fff;
        border: 2px solid #c70039;
        border-radius: 12px;
        overflow: hidden;
        transition: transform 0.3s, box-shadow 0.3s;
        cursor: pointer;
        display: flex;
        flex-direction: column;
    }
    .house-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(199, 0, 57, 0.4);
    }
    .house-card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }
    .house-details {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .house-details h2 {
        margin: 0;
        color: #c70039;
        font-size: 1.5rem;
    }
    .house-details p {
        margin: 0;
        font-size: 1rem;
        line-height: 1.5;
    }
    .house-details span {
        font-weight: bold;
        color: #c70039;
    }
    a.details-link {
        text-decoration: none;
        color: inherit;
    }
</style>
</head>
<body>
<header>Lanka Houses</header>
<main>
    <a href="house-details.html" class="details-link">
        <div class="house-card">
            <img src="images/house1.jpg" alt="House 1">
            <div class="house-details">
                <h2>Luxury Villa</h2>
                <p><span>Location:</span> Colombo</p>
                <p><span>Price:</span> LKR 25,000,000</p>
                <p><span>Bedrooms:</span> 4 | <span>Bathrooms:</span> 3</p>
            </div>
        </div>
    </a>
    <a href="house-details.html" class="details-link">
        <div class="house-card">
            <img src="images/house2.jpg" alt="House 2">
            <div class="house-details">
                <h2>Modern Apartment</h2>
                <p><span>Location:</span> Kandy</p>
                <p><span>Price:</span> LKR 12,500,000</p>
                <p><span>Bedrooms:</span> 2 | <span>Bathrooms:</span> 2</p>
            </div>
        </div>
    </a>
    <a href="house-details.html" class="details-link">
        <div class="house-card">
            <img src="images/house3.jpg" alt="House 3">
            <div class="house-details">
                <h2>Cozy Cottage</h2>
                <p><span>Location:</span> Galle</p>
                <p><span>Price:</span> LKR 8,500,000</p>
                <p><span>Bedrooms:</span> 3 | <span>Bathrooms:</span> 2</p>
            </div>
        </div>
    </a>
</main>
</body>
</html>
